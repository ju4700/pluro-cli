name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag in vMAJOR.MINOR.PATCH format"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev

      - name: Resolve Tag
        id: tag
        run: |
          TAG="${{ github.ref_name }}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          fi

          if [ -z "$TAG" ]; then
            echo "Release tag is required. Use push tag trigger or provide workflow_dispatch input 'tag'."
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using tag: $TAG"

      - name: Install Dependencies
        run: npm ci

      - name: Ensure NPM Token Is Configured
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN secret is missing. Configure it in repository settings before releasing."
            exit 1
          fi

      - name: Verify CI Gate
        env:
          PLURO_DISABLE_KEYCHAIN: "1"
        run: npm run verify:ci

      - name: Verify Release Tag
        run: npm run verify:release-tag -- "${{ steps.tag.outputs.tag }}"

      - name: Verify Package Contents
        run: npm run verify:package

      - name: Publish Package
        run: npm publish --access public

      - name: Create GitHub Release
        if: startsWith(steps.tag.outputs.tag, 'v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
